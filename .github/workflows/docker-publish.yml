name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '11 1 * * 1'
  push:
    branches: [ master ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      restic_tag:
        type: string
        default: ''
        required: false
        description: 'The RESTIC_TAG build argument (defaults to "")'

jobs:
  build:

    environment: ${{ matrix.environment }}
    concurrency:
      cancel-in-progress: false
      group: ci-${{ matrix.environment }}-${{ github.ref }}
      queue: max
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - registry: docker.io
            environment: 'DockerHub'
          - registry: ghcr.io
            environment: 'GitHub'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry docker.io
        if: ${{ 'docker.io' == matrix.registry && github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ matrix.registry }}
          username: ${{ secrets.REGISTRY_LOGIN }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Log into registry ghcr.io
        if: ${{ 'ghcr.io' == matrix.registry && github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ matrix.registry }}
          username: ${{ secrets.REGISTRY_LOGIN }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ secrets.REGISTRY }}${{ secrets.REGISTRY_LOGIN }}/${{ secrets.REGISTRY_IMAGE }}
          flavor: |
            latest=${{ 'refs/heads/master' == github.ref }}
          tags: |
            type=schedule,pattern=weekly
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{raw}}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RESTIC_TAG=${{ inputs.restic_tag }}
